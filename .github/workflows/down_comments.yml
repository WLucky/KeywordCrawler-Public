# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: 多平台关键词检索

on:
  workflow_dispatch:
    inputs:
      enable_dy:
        description: '抖音平台'
        required: true
        type: boolean
        default: true
      enable_bili:
        description: '哔哩哔哩平台'
        required: true
        type: boolean
        default: true
      enable_tavily:
        description: 'Tavily聚合引擎'
        required: true
        type: boolean
        default: true
      keywords:
        description: '请填写搜索关键词'
        required: true
        default: '比亚迪 闪充'
      time_type:
        description: '输入时间范围（天数），0表示不限'
        required: true
        type: number
        default: 1
      max_notes:
        description: '爬取视频数量'
        required: true
        type: number
        default: 15
      max_comments:
        description: '单视频评论数量'
        required: true
        type: number
        default: 20
      enable_sub_comments:
        description: '是否启用二级评论'
        required: true
        type: boolean
        default: true
  schedule:
    # 每天早上7点半执行（UTC时间，北京时间需要+8小时，所以是前一天的23:30 UTC）
    - cron: '30 23 * * *'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install tavily-python
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.11.0'
    - name: Install Playwright
      run: |
        pip install playwright
        playwright install
    - name: Update config and run crawler for each platform
      run: |
        # Build platforms string based on boolean inputs
        PLATFORMS=""
        if [ "${{ github.event.inputs.enable_dy }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},dy"
        fi
        if [ "${{ github.event.inputs.enable_bili }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},bili"
        fi
        if [ "${{ github.event.inputs.enable_tavily }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},tavily"
        fi
        # Remove leading comma if any
        PLATFORMS=$(echo "$PLATFORMS" | sed 's/^,//')
        python run_crawler.py "$PLATFORMS" "${{ github.event.inputs.keywords }}" "${{ github.event.inputs.time_type }}" "${{ github.event.inputs.max_notes }}" "${{ github.event.inputs.max_comments }}" "${{ github.event.inputs.enable_sub_comments }}"
    - name: Package data files
      run: |
        # 设置LC_ALL为UTF-8以支持中文字符
        export LC_ALL=C.UTF-8
        
        # 获取关键词并替换不允许的字符
        KEYWORDS="${{ github.event.inputs.keywords }}"
        # 替换逗号和其他不允许的字符为下划线
        SANITIZED_KEYWORDS=$(echo "$KEYWORDS" | tr ',' '_' | tr ' ' '_' | tr '/' '_')
        DATE="$(TZ="Asia/Shanghai" date +'%Y%m%d')"
        
        # 设置环境变量供后续步骤使用
        echo "PACKAGE_NAME=${DATE}_${{ github.run_id }}.zip" >> $GITHUB_ENV
        echo "RELEASE_NAME=${KEYWORDS}_${DATE}" >> $GITHUB_ENV
        
        # 打包整个data目录
        if [ -d "data" ]; then
          # 使用-UN=UTF8选项确保zip包支持中文
          zip -r -UN=UTF8 "${DATE}_${{ github.run_id }}.zip" data/
          echo "已创建打包文件: ${DATE}_${{ github.run_id }}.zip"
          echo "文件内容:"
          unzip -l "${DATE}_${{ github.run_id }}.zip"
        else
          echo "警告: data 目录不存在"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@master
      with:
        tag_name: Comments-${{ github.run_id }}  # 使用唯一的run_id
        name: ${{ env.RELEASE_NAME }}
        body: |
          ### 数据见下方附件  
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload comments files as release assets
      uses: softprops/action-gh-release@v2.1.0
      with:
        tag_name: Comments-${{ github.run_id }}  # 使用唯一的run_id
        files: ${{ github.workspace }}/${{ env.PACKAGE_NAME }}
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}