# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: 多平台关键词检索

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要爬取的平台'
        required: true
        type: choice
        options:
          - 'xhs'
          - 'dy'
          - 'ks'
          - 'bili'
          - 'wb'
          - 'tieba'
          - 'zhihu'
        default: 'dy'
      keywords:
        description: '请填写搜索关键词'
        required: true
        default: '闪充'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.11.0'
    - name: Install Playwright
      run: |
        pip install playwright
        playwright install
    - name: Update config and run crawler for each platform
      run: |
        python run_crawler.py "${{ github.event.inputs.platforms }}" "${{ github.event.inputs.keywords }}"
    - name: Package data files
      run: |
        KEYWORDS="${{ github.event.inputs.keywords }}"
        DATE="$(TZ="Asia/Shanghai" date +'%Y%m%d')"
        
        # 设置环境变量供后续步骤使用
        echo "PACKAGE_NAME=${KEYWORDS}-${DATE}.zip" >> $GITHUB_ENV
        echo "RELEASE_NAME=${KEYWORDS}-${DATE}" >> $GITHUB_ENV
        
        # 打包整个data目录
        if [ -d "data" ]; then
          zip -r "${KEYWORDS}-${DATE}.zip" data/
          echo "已创建打包文件: ${KEYWORDS}-${DATE}.zip"
          echo "文件内容:"
          unzip -l "${KEYWORDS}-${DATE}.zip"
        else
          echo "警告: data 目录不存在"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@master
      with:
        tag_name: Comments-${{ github.run_id }}  # 使用唯一的run_id
        name: ${{ env.RELEASE_NAME }}
        body: |
          ### 数据见下方附件  
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload comments files as release assets
      uses: softprops/action-gh-release@v2.1.0
      with:
        tag_name: Comments-${{ github.run_id }}  # 使用唯一的run_id
        files: ${{ github.workspace }}/${{ env.PACKAGE_NAME }}
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}