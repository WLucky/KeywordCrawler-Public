# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: 多平台关键词检索

on:
  workflow_dispatch:
    inputs:
      enable_dy:
        description: '抖音平台'
        required: true
        type: boolean
        default: true
      enable_bili:
        description: '哔哩哔哩平台'
        required: true
        type: boolean
        default: true
      enable_tavily:
        description: 'Tavily聚合引擎'
        required: true
        type: boolean
        default: true
      keywords:
        description: '请填写搜索关键词'
        required: true
        default: '比亚迪'
      time_type:
        description: '输入时间范围（天数），0表示不限'
        required: true
        type: number
        default: 0
      max_notes:
        description: '爬取视频数量'
        required: true
        type: number
        default: 15
      max_comments:
        description: '单视频评论数量'
        required: true
        type: number
        default: 8000
      enable_sub_comments:
        description: '是否启用二级评论'
        required: true
        type: boolean
        default: true
      enable_tavily_img:
        description: 'Tavily图片下载'
        required: true
        type: boolean
        default: true
      enable_dy_video_download:
        description: '抖音视频下载'
        required: true
        type: boolean
        default: true
      max_images_per_result:
        description: '每个搜索结果最多下载的图片数'
        required: true
        type: number
        default: 5

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install tavily-python
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.11.0'
    - name: Install Playwright
      run: |
        pip install playwright
        playwright install
    - name: Update config and run crawler for each platform
      run: |
        # Build platforms string based on boolean inputs
        PLATFORMS=""
        if [ "${{ github.event.inputs.enable_dy }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},dy"
        fi
        if [ "${{ github.event.inputs.enable_bili }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},bili"
        fi
        if [ "${{ github.event.inputs.enable_tavily }}" = "true" ]; then
          PLATFORMS="${PLATFORMS},tavily"
        fi
        # Remove leading comma if any
        PLATFORMS=$(echo "$PLATFORMS" | sed 's/^,//')
        KEYWORDS="${{ github.event.inputs.keywords }}"
        TIME_TYPE="${{ github.event.inputs.time_type }}"
        MAX_NOTES="${{ github.event.inputs.max_notes }}"
        MAX_COMMENTS="${{ github.event.inputs.max_comments }}"
        ENABLE_SUB_COMMENTS="${{ github.event.inputs.enable_sub_comments }}"
        ENABLE_TAVILY_IMG="${{ github.event.inputs.enable_tavily_img }}"
        ENABLE_DY_VIDEO_DOWNLOAD="${{ github.event.inputs.enable_dy_video_download }}"
        MAX_IMAGES_PER_RESULT="${{ github.event.inputs.max_images_per_result }}"
        python run_crawler.py "$PLATFORMS" "$KEYWORDS" "$TIME_TYPE" "$MAX_NOTES" "$MAX_COMMENTS" "$ENABLE_SUB_COMMENTS" "$ENABLE_TAVILY_IMG" "$MAX_IMAGES_PER_RESULT" "$ENABLE_DY_VIDEO_DOWNLOAD"
    - name: Package data files
      run: |
        # 设置LC_ALL为UTF-8以支持中文字符
        export LC_ALL=C.UTF-8
        
        # 获取关键词并替换不允许的字符
        KEYWORDS="${{ github.event.inputs.keywords }}"
        # 替换逗号和其他不允许的字符为下划线
        SANITIZED_KEYWORDS=$(echo "$KEYWORDS" | tr ',' '_' | tr ' ' '_' | tr '/' '_')
        DATE="$(TZ="Asia/Shanghai" date +'%Y%m%d')"
        
        # 设置环境变量供后续步骤使用
        echo "RELEASE_NAME=${KEYWORDS}_${DATE}" >> $GITHUB_ENV
        echo "SANITIZED_KEYWORDS=${SANITIZED_KEYWORDS}" >> $GITHUB_ENV
        
        # 打包整个data目录
        if [ -d "data" ]; then
          # 计算data目录大小（字节）
          DATA_SIZE=$(du -sb data/ | cut -f1)
          echo "data目录大小: $DATA_SIZE 字节"
          
          # 1.5GB = 1.5 * 1024 * 1024 * 1024 = 1610612736 字节
          MAX_SIZE=1610612736
          
          if [ "$DATA_SIZE" -gt "$MAX_SIZE" ]; then
            echo "data目录超过1.5GB，将进行分卷压缩"
            # 使用分卷压缩，每卷1.5GB（1500MB）
            zip -r -UN=UTF8 -s 1500m "${DATE}_${{ github.run_id }}" data/
            echo "已创建分卷压缩文件"
            
            # 获取所有分卷文件名
            PART_FILES=$(ls "${DATE}_${{ github.run_id }}".z* 2>/dev/null | tr '\n' ' ')
            echo "PART_FILES=$PART_FILES" >> $GITHUB_ENV
            echo "PACKAGE_COUNT=$(ls "${DATE}_${{ github.run_id }}".z* 2>/dev/null | wc -l)" >> $GITHUB_ENV
            echo "PACKAGE_NAME=${DATE}_${{ github.run_id }}.z01" >> $GITHUB_ENV
          else
            echo "data目录未超过1.5GB，进行普通压缩"
            # 使用-UN=UTF8选项确保zip包支持中文
            zip -r -UN=UTF8 "${DATE}_${{ github.run_id }}.zip" data/
            echo "已创建打包文件: ${DATE}_${{ github.run_id }}.zip"
            echo "PART_FILES=${DATE}_${{ github.run_id }}.zip" >> $GITHUB_ENV
            echo "PACKAGE_COUNT=1" >> $GITHUB_ENV
            echo "PACKAGE_NAME=${DATE}_${{ github.run_id }}.zip" >> $GITHUB_ENV
          fi
          
          echo "文件内容:"
          ls -la "${DATE}_${{ github.run_id }}"* 2>/dev/null || ls -la "${DATE}_${{ github.run_id }}.zip" 2>/dev/null
        else
          echo "警告: data 目录不存在"
          echo "PART_FILES=" >> $GITHUB_ENV
          echo "PACKAGE_COUNT=0" >> $GITHUB_ENV
        fi

    - name: Read markdown content for release
      id: markdown
      run: |
        # 设置UTF-8编码
        export LC_ALL=C.UTF-8
        export LANG=C.UTF-8
        
        # 查找markdown文件
        MARKDOWN_FILE=$(find data -name "视频下载链接_*.md" 2>/dev/null | head -n 1)
        
        if [ -n "$MARKDOWN_FILE" ] && [ -f "$MARKDOWN_FILE" ]; then
          echo "找到markdown文件: $MARKDOWN_FILE"
          # 读取内容并转义特殊字符用于JSON
          CONTENT=$(cat "$MARKDOWN_FILE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          echo "MARKDOWN_CONTENT=$CONTENT" >> $GITHUB_OUTPUT
          echo "HAS_MARKDOWN=true" >> $GITHUB_OUTPUT
        else
          echo "未找到markdown文件"
          echo "HAS_MARKDOWN=false" >> $GITHUB_OUTPUT
          echo "MARKDOWN_CONTENT=" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@master
      with:
        tag_name: Comments-${{ github.run_id }}
        name: ${{ env.RELEASE_NAME }}
        body: |
          ### 数据下载
          
          点击下方附件下载完整数据包。
          
          ### 视频下载链接汇总
          
          ${{ steps.markdown.outputs.HAS_MARKDOWN == 'true' && fromJSON(steps.markdown.outputs.MARKDOWN_CONTENT) || '（暂无视频下载链接）' }}
          
          ### 数据内容
          - 各平台视频元数据
          - 视频评论数据
          - 创作者信息
          - 视频下载链接汇总（Markdown格式）
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload comments files as release assets
      uses: softprops/action-gh-release@v2.1.0
      with:
        tag_name: Comments-${{ github.run_id }}  # 使用唯一的run_id
        files: |
          ${{ github.workspace }}/${{ env.PACKAGE_NAME }}
          ${{ github.workspace }}/${{ env.PART_FILES }}
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
